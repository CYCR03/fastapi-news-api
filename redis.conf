# ============================================
# Redis 配置文件
# 适用场景：通用缓存（新闻列表、热点排行等）
# 配置原则：性能优先，不关心数据持久性
# ============================================

# -------- 内存管理 --------

# 最大内存限制，达到限制后根据淘汰策略移除旧数据
maxmemory 256mb

# 缓存淘汰策略：所有 key 按 LRU（最近最少使用）算法淘汰
# allkeys-lru   — 所有 key 参与淘汰（缓存场景最常用）
# volatile-lru  — 仅淘汰设置了过期时间的 key
# noeviction    — 不淘汰，写入返回错误（不适合缓存）
maxmemory-policy allkeys-lru

# -------- 持久化（缓存场景关闭以提升性能）--------

# 关闭 RDB 快照持久化
# 默认配置会在 60 秒内 10000 次写入时自动保存，缓存场景不需要
save ""
# 关闭 AOF 持久化
appendonly no

# -------- 网络配置 --------

# 关闭保护模式
# 开发环境中配合密码验证使用，允许宿主机通过端口映射访问
protected-mode no
# 监听端口
port 6379
# 监听地址
# 默认监听所有地址（0.0.0.0）
bind 0.0.0.0      

# -------- 客户端连接 --------

# 空闲客户端超时关闭时间（秒），0 表示不关闭
timeout 0
# TCP keepalive 间隔（秒），定期检测客户端是否存活
# tcp-keepalive 60

# -------- 慢查询日志 --------

# 慢查询阈值（微秒），超过此时间的命令会被记录
# 10000 微秒 = 10 毫秒
slowlog-log-slower-than 10000
# 慢查询日志最大条数，超出后淘汰最旧的
slowlog-max-len 128
