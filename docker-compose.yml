services:
  # ============================================
  # MySQL 数据库服务
  # ============================================
  mysql:
    image: mysql:latest              # 使用 MySQL 最新镜像
    container_name: my_mysql         # 容器名称
    restart: always                  # 容器退出后自动重启
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}  # root 密码从 .env 读取
    ports:
      - "3307:3306"                   # 宿主机 3307 映射到容器 3306（避免与本地 MySQL 冲突）
    volumes:
      - mysql_data:/var/lib/mysql     # 挂载命名卷持久化数据

  # ============================================
  # Redis 缓存服务（通用缓存场景）
  # ============================================
  redis:
    image: redis:7-alpine             # 使用 Redis 7 轻量版镜像
    container_name: my_redis          # 容器名称
    restart: always                   # 容器退出后自动重启

    # 密码通过 --requirepass 动态传入（从 .env 读取），避免写死在配置文件里
    # 同时加载自定义 redis.conf 以应用其他配置项
    command: redis-server --requirepass ${REDIS_PASSWORD} /usr/local/etc/redis/redis.conf
    
    ports:
      - "6379:6379"                   # 宿主机 6379 映射到容器 6379
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf  # 挂载自定义配置文件
      - redis_data:/data              # 挂载命名卷持久化数据（注意缓存场景是不需要持久化的）

volumes:
  mysql_data:         # MySQL 数据卷
    external: true    

  redis_data:         # Redis 数据卷
    external: true    
